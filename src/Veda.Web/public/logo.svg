<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="VedaAide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b85ff"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square with indigo gradient -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Subtle neural constellation nodes (background layer) -->
  <circle cx="32" cy="9"  r="1.8" fill="rgba(255,255,255,0.22)"/>
  <circle cx="18" cy="8"  r="1.2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="46" cy="8"  r="1.2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="8"  cy="28" r="1.4" fill="rgba(255,255,255,0.18)"/>
  <circle cx="56" cy="28" r="1.4" fill="rgba(255,255,255,0.18)"/>

  <!-- Subtle connection lines between constellation nodes -->
  <line x1="12" y1="16" x2="18" y2="8"  stroke="rgba(255,255,255,0.11)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="16" x2="32" y2="9"  stroke="rgba(255,255,255,0.09)" stroke-width="1"   stroke-linecap="round"/>
  <line x1="12" y1="16" x2="8"  cy="28" stroke="rgba(255,255,255,0.10)" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="52" y1="16" x2="46" y2="8"  stroke="rgba(255,255,255,0.11)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="52" y1="16" x2="32" y2="9"  stroke="rgba(255,255,255,0.09)" stroke-width="1"   stroke-linecap="round"/>
  <line x1="52" y1="16" x2="56" y2="28" stroke="rgba(255,255,255,0.10)" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Main V shape (with subtle glow) -->
  <polyline
    points="12,16 32,46 52,16"
    fill="none"
    stroke="rgba(255,255,255,0.95)"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />

  <!-- Node circles at the two top tips of V -->
  <circle cx="12" cy="16" r="4" fill="rgba(255,255,255,0.80)"/>
  <circle cx="52" cy="16" r="4" fill="rgba(255,255,255,0.80)"/>

  <!-- Amber knowledge-spark at the V convergence point -->
  <circle cx="32" cy="46" r="6.5" fill="url(#sparkGrad)" filter="url(#softGlow)"/>
  <circle cx="32" cy="46" r="3"   fill="#fffbeb"/>
</svg>
