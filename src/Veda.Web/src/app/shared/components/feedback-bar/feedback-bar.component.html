<div class="feedback-bar">
  <span class="feedback-label">{{ labels[lang].feedbackQuestion }}</span>
  <button
    class="btn-vote btn-up"
    [class.selected]="given === 'up'"
    [disabled]="given !== null"
    (click)="vote('up')"
    [title]="labels[lang].helpful"
  >{{ labels[lang].helpful }}</button>
  <button
    class="btn-vote btn-down"
    [class.selected]="given === 'down'"
    [disabled]="given !== null"
    (click)="vote('down')"
    [title]="labels[lang].notHelpful"
  >{{ labels[lang].notHelpful }}</button>
</div>
